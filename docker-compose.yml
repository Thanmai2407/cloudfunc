version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: cloudfunc-postgres-compose
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloudfunc
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cloudfunc-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: cloudfunc-rabbitmq-compose
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cloudfunc-network

  registry:
    build: ./registry
    container_name: cloudfunc-registry
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: cloudfunc
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloudfunc-network

  gateway:
    build: ./gateway
    container_name: cloudfunc-gateway
    ports:
      - "5001:5001"
    environment:
      REGISTRY_URL: http://registry:8080
      RABBITMQ_URL: amqp://rabbitmq:5672
      PORT: 5001
    depends_on:
      rabbitmq:
        condition: service_healthy
      registry:
        condition: service_started
    networks:
      - cloudfunc-network

  container-manager:
    build: ./container-manager
    container_name: cloudfunc-container-manager
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      REGISTRY_URL: http://registry:8080
      PORT: 3000
      EXECUTION_TIMEOUT: 5000
    depends_on:
      registry:
        condition: service_started
    networks:
      - cloudfunc-network

  worker:
    build: ./Worker/worker
    container_name: cloudfunc-worker
    ports:
      - "5002:5002"
    environment:
      RABBITMQ_URL: amqp://rabbitmq:5672
      REGISTRY_URL: http://registry:8080
      CONTAINER_URL: http://container-manager:3000
      WORKER_PORT: 5002
      MAX_RETRIES: 3
    depends_on:
      rabbitmq:
        condition: service_healthy
      registry:
        condition: service_started
      container-manager:
        condition: service_started
    networks:
      - cloudfunc-network

networks:
  cloudfunc-network:
    name: cloudfunc-network
    driver: bridge
